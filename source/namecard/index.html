<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="张楚雯的个人电子名片：财务会计，GitHub zcwzuimei。"
    />
    <title>张楚雯 | 个人电子名片</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-theme="light">
    <main class="page-shell">
      <section class="profile-card" aria-labelledby="profile-name">
        <div class="theme-switcher" aria-label="主题切换">
          <button class="theme-option is-active" type="button" data-theme-value="light">
            Apple Light
          </button>
          <button class="theme-option" type="button" data-theme-value="swan">
            Swan Pink
          </button>
          <button class="theme-option" type="button" data-theme-value="sport">
            Sport Fresh
          </button>
          <button class="theme-option" type="button" data-theme-value="night">
            Night Elegant
          </button>
        </div>

        <div class="profile-layout">
          <div class="avatar-panel" aria-hidden="true">
            <div class="avatar-orbit">
              <img
                class="avatar"
                src="assets/avatar-ref.png"
                alt=""
                width="1024"
                height="1024"
              />
            </div>
          </div>

          <div class="profile-content">
            <p class="eyebrow">Personal Name Card</p>
            <h1 id="profile-name">张楚雯</h1>
            <p class="nickname">张天鹅</p>
            <p class="role">财务会计</p>

            <p class="bio">
              羽毛球一级预备役选手，小面包收割机，宠猫狂魔，间歇性学霸。
            </p>

            <div class="trait-list" aria-label="个人标签">
              <span>羽毛球一级预备役选手</span>
              <span>小面包收割机</span>
              <span>宠猫狂魔</span>
              <span>间歇性学霸</span>
            </div>

            <div class="contact-row">
              <a
                class="github-link"
                href="https://github.com/zcwzuimei"
                target="_blank"
                rel="noreferrer"
                aria-label="打开张楚雯的 GitHub 主页"
              >
                <svg
                  class="github-mark"
                  viewBox="0 0 24 24"
                  aria-hidden="true"
                  focusable="false"
                >
                  <path
                    d="M12 2a10 10 0 0 0-3.16 19.49c.5.09.68-.22.68-.48v-1.69c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.35 1.08 2.92.83.09-.65.35-1.08.63-1.33-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.53 9.53 0 0 1 12 5.85c.85 0 1.71.11 2.51.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.86v2.76c0 .26.18.58.69.48A10 10 0 0 0 12 2Z"
                  />
                </svg>
                <span>zcwzuimei</span>
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>

</html>
